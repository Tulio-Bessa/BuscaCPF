<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crachá de Identificação</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
   
</head>
<body>

    <div class="container-fluid">
        <!-- Formulário de Cadastro -->
        <div class="formulario">
            <h2>Cadastro de Cliente</h2>
            <form>
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome:</label>
                    <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite o nome" required>
                </div>
                <div class="mb-3">
                    <label for="telefone" class="form-label">Telefone:</label>
                    <input type="tel" class="form-control" id="telefone" name="telefone" placeholder="Digite o telefone" required>
                </div>
                <div class="mb-3">
                    <label for="cpf" class="form-label">CPF:</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" placeholder="Digite o CPF" required>
                </div>
                <div class="mb-3">
                    <label for="endereco" class="form-label">Endereço:</label>
                    <input type="text" class="form-control" id="endereco" name="endereco" placeholder="Digite o endereço" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            </form>
        </div>

        <!-- Coluna com busca e crachá -->
        <div>
            <!-- Formulário de busca por CPF -->
            <div class="formulario mb-4">
                <h2>Buscar Cliente por CPF</h2>
                <div class="mb-3">
                    <input type="text" id="cpf-busca" class="form-control" placeholder="Digite o CPF">
                </div>
                <button onclick="buscarCliente()" class="btn btn-primary w-100">Buscar</button>
            </div>

            <!-- Crachá do cliente -->
            <div class="container d-flex justify-content-center mt-3">
                <div class="cracha">
                    <!-- Foto do usuário -->
                    <img id="foto-usuario" src="user.jpg" alt="Foto do Usuário">
                    <!-- Informações do usuário -->
                    <div class="cracha-info">
                        <h5 id="nome-usuario">Adryan Ryan</h5>
                        <p class="email" id="email-usuario">adryanryan@lolzin.com</p>
                        <p class="phone" id="telefone-usuario">Telefone: 4002-8922</p>
                        <p class="cpf" id="cpf-usuario">CPF: 123.456.789-00</p>
                        <p class="address" id="endereco-usuario">Endereço: Samuel Rift, 444 - Bairro SKT1, RIOT, RT</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exemplo de dados fictícios
        const clientes = [
            {
                cpf: "123.456.789-00",
                nome: "Adryan Ryan",
                email: "adryanryan@lolzin.com",
                telefone: "4002-8922",
                endereco: "Samuel Rift, 444 - Bairro SKT1, RIOT, RT",
                foto: "user.jpg"
            },
            {
                cpf: "987.654.321-00",
                nome: "Maria Silva",
                email: "maria.silva@example.com",
                telefone: "3003-4567",
                endereco: "Rua das Flores, 123 - Bairro Primavera, Cidade XYZ",
                foto: "user2.jpg"
            }
        ];

        function buscarCliente() {
            const cpfDigitado = document.getElementById('cpf-busca').value.trim();
            const cliente = clientes.find(c => c.cpf === cpfDigitado);

            if (cliente) {
                document.getElementById('nome-usuario').innerText = cliente.nome;
                document.getElementById('email-usuario').innerText = cliente.email;
                document.getElementById('telefone-usuario').innerText = `Telefone: ${cliente.telefone}`;
                document.getElementById('cpf-usuario').innerText = `CPF: ${cliente.cpf}`;
                document.getElementById('endereco-usuario').innerText = `Endereço: ${cliente.endereco}`;
                document.getElementById('foto-usuario').src = cliente.foto;
            } else {
                alert("Cliente não encontrado!");
            }
        }
    </script>

</body>
</html>
